version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:14-alpine
    container_name: soc-postgres
    environment:
      POSTGRES_USER: soc_user
      POSTGRES_PASSWORD: soc_password
      POSTGRES_DB: soc_alerts
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soc_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - soc-network

  # Redis Cache & Message Queue
  redis:
    image: redis:7-alpine
    container_name: soc-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - soc-network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: soc-backend
    environment:
      DATABASE_URL: postgresql://soc_user:soc_password@postgres:5432/soc_alerts
      REDIS_URL: redis://redis:6379/0
      APP_NAME: SOC Alert Triage
      DEBUG: "True"
      SECRET_KEY: your-secret-key-change-in-production
      JWT_SECRET_KEY: your-jwt-secret-key-change-in-production
      CORS_ORIGINS: '["http://localhost:3000", "http://frontend:3000"]'
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - soc-network

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: soc-frontend
    environment:
      REACT_APP_API_URL: http://localhost:8000
      REACT_APP_API_BASE_PATH: /api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    networks:
      - soc-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: soc-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - soc-network

  # Prometheus for Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: soc-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - soc-network

networks:
  soc-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  prometheus_data: